name: Weekly proposal pack

on:
  workflow_dispatch:
    inputs:
      reuse_today_successes:
        description: "Manual rerun: reuse scrapers that already succeeded today"
        required: true
        type: boolean
        default: true
  schedule:
    # GitHub schedules are UTC. This is 03:00 Zagreb during summer time.
    - cron: "0 1 * * 1"

jobs:
  build-proposal-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set same-day scrape date
        run: echo "SCRAPE_RUN_DATE=$(TZ=Europe/Zagreb date +%F)" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Clear generated files from checkout
        run: |
          rm -f outputs/*_current.csv outputs/*_previous.csv
          rm -rf workable_data
          mkdir -p workable_data

      - name: Restore last successful scraper baseline
        uses: actions/cache/restore@v4
        with:
          path: outputs
          key: scraper-baseline-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            scraper-baseline-${{ runner.os }}-${{ github.ref_name }}-

      - name: Restore same-day scraper state
        if: github.event_name == 'workflow_dispatch' && inputs.reuse_today_successes == true
        uses: actions/cache/restore@v4
        with:
          path: |
            outputs
            workable_data/scrape_status_latest.csv
          key: scraper-state-${{ runner.os }}-${{ github.ref_name }}-${{ env.SCRAPE_RUN_DATE }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            scraper-state-${{ runner.os }}-${{ github.ref_name }}-${{ env.SCRAPE_RUN_DATE }}-

      - name: Run scrape and proposal pipeline
        env:
          RESUME_TODAY: ${{ github.event_name == 'workflow_dispatch' && inputs.reuse_today_successes == true }}
        run: |
          args=(--scrape)
          if [ "$RESUME_TODAY" = "true" ]; then
            args+=(--resume-successful-today)
          fi
          python automation/pricing_pipeline.py "${args[@]}"

      - name: Save last successful scraper baseline
        if: success()
        uses: actions/cache/save@v4
        with:
          path: outputs
          key: scraper-baseline-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save same-day scraper state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            outputs
            workable_data/scrape_status_latest.csv
          key: scraper-state-${{ runner.os }}-${{ github.ref_name }}-${{ env.SCRAPE_RUN_DATE }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload proposal pack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-proposal-pack
          retention-days: 30
          path: |
            outputs/*_current.csv
            outputs/*_previous.csv
            workable_data/combined_scrapped_data_latest.csv
            workable_data/market_prices_annotated.csv
            workable_data/market_prices_outlier_audit_log.csv
            workable_data/ht_prices_latest.csv
            workable_data/ht_failed_countries_latest.csv
            workable_data/scrape_status_latest.csv
            workable_data/scrape_status_history/*.csv
            workable_data/logs/*.log
            workable_data/history/combined_scrapped_data_*.csv
            workable_data/history/ht_prices_*.csv
            workable_data/USD/*.csv
            workable_data/USD/history/*.csv
            workable_data/EUR/*.csv
            workable_data/EUR/history/*.csv
