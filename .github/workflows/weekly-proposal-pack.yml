name: Weekly proposal pack

on:
  workflow_dispatch:
    inputs:
      reuse_today_successes:
        description: "Manual rerun: reuse scrapers that already succeeded today"
        required: true
        type: boolean
        default: true
  schedule:
    # GitHub schedules are UTC. This is 03:00 Zagreb during summer time.
    - cron: "0 1 * * 1"

jobs:
  build-proposal-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore private PPG cost file from secret
        env:
          WS_PPG_CSV_B64: ${{ secrets.WS_PPG_CSV_B64 }}
        run: |
          if [ -n "$WS_PPG_CSV_B64" ]; then
            mkdir -p inputs
            printf '%s' "$WS_PPG_CSV_B64" | base64 --decode > inputs/WS_PPG.csv
            echo "Loaded inputs/WS_PPG.csv from GitHub secret."
          else
            echo "No WS_PPG_CSV_B64 secret configured; using repository inputs/WS_PPG.csv if present."
          fi

      - name: Set same-day scrape date
        run: echo "SCRAPE_RUN_DATE=$(TZ=Europe/Zagreb date +%F)" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Clear generated files from checkout
        run: |
          rm -rf scrapes outputs
          mkdir -p scrapes outputs

      - name: Restore last successful scraper baseline
        uses: actions/cache/restore@v4
        with:
          path: scrapes
          key: scraper-baseline-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            scraper-baseline-${{ runner.os }}-${{ github.ref_name }}-

      - name: Restore same-day scraper state
        if: github.event_name == 'workflow_dispatch' && inputs.reuse_today_successes == true
        uses: actions/cache/restore@v4
        with:
          path: |
            scrapes
            outputs/diagnostics/scrape_status_latest.csv
          key: scraper-state-${{ runner.os }}-${{ github.ref_name }}-${{ env.SCRAPE_RUN_DATE }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            scraper-state-${{ runner.os }}-${{ github.ref_name }}-${{ env.SCRAPE_RUN_DATE }}-

      - name: Run scrape and proposal pipeline
        env:
          RESUME_TODAY: ${{ github.event_name == 'workflow_dispatch' && inputs.reuse_today_successes == true }}
        run: |
          args=(--scrape)
          if [ "$RESUME_TODAY" = "true" ]; then
            args+=(--resume-successful-today)
          fi
          python automation/pricing_pipeline.py "${args[@]}"

      - name: Save last successful scraper baseline
        if: success()
        uses: actions/cache/save@v4
        with:
          path: scrapes
          key: scraper-baseline-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save same-day scraper state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            scrapes
            outputs/diagnostics/scrape_status_latest.csv
          key: scraper-state-${{ runner.os }}-${{ github.ref_name }}-${{ env.SCRAPE_RUN_DATE }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload proposal pack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-proposal-pack
          retention-days: 30
          path: |
            scrapes/*_current.csv
            scrapes/*_previous.csv
            outputs/combined_scrapes/combined_scrape_latest.csv
            outputs/combined_scrapes/history/combined_scrape_*.csv
            outputs/market_analysis/market_prices_annotated_latest.csv
            outputs/market_analysis/outlier_audit_latest.csv
            outputs/model_proposals/USD/*.csv
            outputs/model_proposals/USD/history/*.csv
            outputs/model_proposals/EUR/*.csv
            outputs/model_proposals/EUR/history/*.csv
            outputs/diagnostics/scrape_status_latest.csv
            outputs/diagnostics/scrape_status_history/*.csv
            outputs/diagnostics/logs/*.log
